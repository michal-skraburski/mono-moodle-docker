{{- $p := .OriginalReq.URL.Path -}}
{{- $md := "/index.md" -}}
{{- if ne $p "/" -}}{{- $md = print $p ".md" -}}{{- end -}}
{{- $doc := splitFrontMatter (include $md) -}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ with $doc.Meta.title }}{{ . }}{{ else }}Docs{{ end }}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      max-width: 46rem;
      margin: 0 auto;
      padding: 2.5rem 1.25rem 4rem;
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #1b1f24;
      background: #fff;
    }
    h1, h2, h3 { line-height: 1.25; margin-top: 2rem; }
    h1 { border-bottom: 1px solid #d0d7de; padding-bottom: .3rem; }
    a { color: #0969da; }
    code {
      background: rgba(129,139,152,.15);
      padding: .2em .4em;
      border-radius: 6px;
      font-size: 85%;
    }
    pre {
      background: #f6f8fa;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
    }
    pre code { background: none; padding: 0; }
    @media (prefers-color-scheme: dark) {
      body { color: #e6edf3; background: #0d1117; }
      h1 { border-color: #30363d; }
      a { color: #4493f8; }
      pre { background: #161b22; }
    }
  </style>
</head>
<body>
<article>
{{ markdown $doc.Body }}
</article>
</body>
</html>
